<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northwind SOTA Query Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
            background: radial-gradient(circle at top left, #1e1e24, #0a0a0c);
            color: white;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .rule-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        select, input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        select:focus, input:focus {
            border-color: #61dafb;
        }
        button {
            background: linear-gradient(135deg, #0078d4, #005a9e);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #d40032, #9e0026);
            padding: 10px 14px;
        }
        .btn-danger:hover {
            box-shadow: 0 4px 12px rgba(212, 0, 50, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }
        .group-container {
            margin-left: 20px;
            border-left: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .group-container::before {
            content: '';
            position: absolute;
            left: -2px;
            top: 20px;
            width: 20px;
            height: 2px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div id="elmish-app"></div>
    <script type="module" src="/App.fs.js"></script>
</body>
</html>
